<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand">Contact</a>
  </div>
</nav>

<div class="container mt-5">
  <div class="row">

    <!-- Form -->
    <div class="col-md-6">
      <h3>Hubungi Kami</h3>
      <form>
        <div class="mb-3">
          <label>Nama</label>
          <input type="text" class="form-control">
        </div>

        <div class="mb-3">
          <label>Email</label>
          <input type="email" class="form-control">
        </div>

        <div class="mb-3">
          <label>Pesan</label>
          <textarea class="form-control"></textarea>
        </div>

        <button class="btn btn-primary">Kirim</button>
      </form>
    </div>

    <!-- Info -->
    <div class="col-md-6">
      <h3>Informasi</h3>
      <p>📍 Jl. Sultan Agung, Banyuwangi</p>
      <p>📞 08123456789</p>

      <iframe src="https://maps.google.com/maps?q=banyuwangi&t=&z=13&ie=UTF8&iwloc=&output=embed"
              width="100%" height="250"></iframe>
    </div>

  </div>
</div>

</body>
</html>
